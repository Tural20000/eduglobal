server:
  port: 8081

spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/eduglobal?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: "1234" # Parolu dırnaq içində yazmaq daha təhlükəsizdir
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  
  h2:
    console:
      enabled: false

  sql:
    init:
      mode: always

  # Redis problem yaratmasın deyə müvəqqəti söndürdük
  cache:
    type: none 

logging:
  level:
    org.springframework.cache: DEBUG