        {en: "Incentive", az: "H蓹v蓹sl蓹ndirm蓹 / Stimul"}, {en: "Inevitably", az: "Qa莽谋lmaz olaraq"}, 
        {en: "Innate", az: "Anadang蓹lm蓹 / Daxili"}, {en: "Juxtaposition", az: "Yan-yana qoyma (m眉qayis蓹 眉莽眉n)"}, 
        {en: "Lethargic", az: "S眉st / Keyl蓹艧mi艧"}, {en: "Magnanimous", az: "Alic蓹nab / 茝lia莽谋q"}, 
        {en: "Meticulous", az: "H蓹ddind蓹n art谋q diqq蓹tli"}, {en: "Nefarious", az: "M蓹nfur / 脟ox pis"}, 
        {en: "Obsolete", az: "K枚hn蓹lmi艧 / 陌stifad蓹d蓹n 莽谋xm谋艧"}, {en: "Paradigm", az: "Paradigma / N眉mun蓹"}, 
        {en: "Plausible", az: "A臒labatan / 陌nand谋r谋c谋"}, {en: "Pragmatic", az: "Praqmatik / Realist"},

    const tableBody = document.getElementById('vocab-table-body');

    function displayWords() {
        wordsC1.forEach(item => {

    function speak(text, rate) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);

</script>
