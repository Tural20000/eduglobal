<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="theme-init.js"></script>
    <title>Tez cavab - EduGlobal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --dark: #2c3e50; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .back-link { color: var(--primary); text-decoration: none; font-weight: 600; }
        .stats { font-weight: 700; color: var(--dark); }
        .q-box {
            max-width: 600px; margin: 0 auto; background: white; border-radius: 16px;
            padding: 32px; box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .q-box .q-text { font-size: 1.25rem; margin-bottom: 24px; color: var(--dark); font-weight: 600; }
        .opt-grid { display: grid; gap: 12px; }
        .opt-btn {
            padding: 16px; border: 2px solid #e0e0e0; border-radius: 10px; background: white;
            cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s;
        }
        .opt-btn:hover { border-color: var(--primary); }
        .opt-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--error); color: white; border-color: var(--error); }
        .result-box { text-align: center; padding: 40px 20px; display: none; }
        .result-box h2 { margin-bottom: 16px; color: var(--dark); }
        .start-btn { padding: 14px 32px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <a href="games.html" class="back-link"><i class="fas fa-arrow-left"></i> Oyunlara qayıt</a>
        <span class="stats">Xal: <span id="score">0</span> &nbsp; Vaxt: <span id="timer">30</span>s</span>
    </header>
    <div class="q-box" id="gameArea">
        <div id="startScreen" style="text-align:center; padding:20px;">
            <h2 style="margin-bottom:12px;">Tez cavab</h2>
            <p style="color:#666; margin-bottom:24px;">30 saniyə ərzində nə qədər suala düzgün cavab verə bilərsiniz?</p>
            <button class="start-btn" onclick="startGame()">Başla</button>
        </div>
        <div id="quizScreen" style="display:none;">
            <p class="q-text" id="questionText"></p>
            <div class="opt-grid" id="optionsList"></div>
        </div>
    </div>
    <div class="q-box result-box" id="resultScreen">
        <h2>Oyun bitdi!</h2>
        <p id="finalScore" style="font-size:1.2rem; margin-bottom:20px;"></p>
        <a href="game-quiz.html" style="display:inline-block; padding:12px 24px; background:var(--primary); color:white; border-radius:10px; text-decoration:none; font-weight:600;">Yenidən oyna</a>
        <a href="games.html" style="display:inline-block; padding:12px 24px; background:#95a5a6; color:white; border-radius:10px; text-decoration:none; font-weight:600; margin-left:10px;">Oyunlar</a>
    </div>
    <script>
        const API_BASE_URL = 'http://localhost:8082';
        let questions = [];
        let currentQ = 0;
        let score = 0;
        let timeLeft = 30;
        let timerId = null;

        const fallbackQuestions = [
            { questions: "I ___ a student.", optionA: "am", optionB: "is", optionC: "are", optionD: "be", correctAnswer: "A" },
            { questions: "She ___ to school.", optionA: "go", optionB: "goes", optionC: "going", optionD: "went", correctAnswer: "B" },
            { questions: "We ___ English.", optionA: "study", optionB: "studies", optionC: "studying", optionD: "studied", correctAnswer: "A" }
        ];

        async function loadQuestions() {
            try {
                var r = await fetch(API_BASE_URL + '/api/quiz-questions/exam?limit=30');
                if (r.ok) {
                    var data = await r.json();
                    if (data.length > 0) {
                        questions = data.map(function (q) {
                            return { questions: q.question, optionA: q.optionA, optionB: q.optionB, optionC: q.optionC, optionD: q.optionD, correctAnswer: q.correctAnswer || 'A' };
                        });
                        return;
                    }
                }
            } catch (e) {}
            try {
                var r2 = await fetch(API_BASE_URL + '/api/questions/exam');
                if (r2.ok) { var data = await r2.json(); if (data.length > 0) questions = data; }
            } catch (e2) {}
            if (questions.length === 0) questions = fallbackQuestions;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            score = 0;
            timeLeft = 30;
            currentQ = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('timer').textContent = '30';
            if (timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            showQuestion();
        }

        function showQuestion() {
            if (currentQ >= questions.length) { endGame(); return; }
            const q = questions[currentQ];
            document.getElementById('questionText').textContent = (currentQ + 1) + '. ' + q.questions;
            const opts = [q.optionA, q.optionB, q.optionC, q.optionD].filter(Boolean);
            const letters = ['A','B','C','D'];
            const list = document.getElementById('optionsList');
            list.innerHTML = opts.map((opt, i) => {
                const letter = letters[i];
                return '<button class="opt-btn" onclick="answer(\'' + letter + '\')">' + letter + '. ' + opt + '</button>';
            }).join('');
        }

        function answer(letter) {
            const q = questions[currentQ];
            const correct = (q.correctAnswer || '').toUpperCase() === letter.toUpperCase();
            if (correct) {
                score++;
                document.getElementById('score').textContent = score;
            }
            const lettersArr = ['A','B','C','D'];
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (lettersArr[i] === (q.correctAnswer || '').toUpperCase()) b.classList.add('correct');
                else if (lettersArr[i] === letter) b.classList.add('wrong');
            });
            currentQ++;
            setTimeout(() => {
                if (timeLeft <= 0) return;
                showQuestion();
            }, 600);
        }

        function endGame() {
            if (timerId) { clearInterval(timerId); timerId = null; }
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = 'Xal: ' + score + ' / ' + questions.length;
        }

        loadQuestions();
    </script>
    <script src="theme.js"></script>
</body>
</html>
