<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="theme-init.js"></script>
    <title>Material - EduGlobal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 40px 20px; text-align: center; }
        .box { max-width: 500px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
        .box h1 { color: #2c3e50; margin-bottom: 12px; font-size: 1.5rem; }
        .box p { color: #7f8c8d; margin-bottom: 24px; }
        a { display: inline-block; padding: 12px 24px; background: #3498db; color: white; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="title">Material</h1>
        <p id="desc">Bu bölmə üçün materiallar tezliklə əlavə ediləcək.</p>
        <a href="dashboard.html"><i class="fas fa-home"></i> Ana menyu</a>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || '';
        const level = params.get('level') || '';
        const titles = { grammar: 'Qrammatika', vocabulary: 'Vocabulary', reading: 'Reading' };
        document.getElementById('title').textContent = (titles[type] || 'Material') + ' ' + level;
        document.getElementById('desc').textContent = level + ' səviyyəsi üçün materiallar tezliklə burada yerləşdiriləcək.';
    </script>
    <script src="theme.js"></script>
</body>
</html>
